        hf_slug: Qwen/Qwen3.6-35B-A3B-FP8
        context_window_tokens: 49152
        endpoint: https://openrouter.ai/api/v1
        prompt_reflection: generator_reflection_v1.md
        sampling:   # generation_config default minus presence_penalty (A/B winner; pp=1.5 hurt quality)
