charter_path: resources/ModelRaisingConstitution_v0.1.md
data_dir: data
max_tokens: 3840
phase1:
  dataset: locuslab/fineweb_annotated
  subsets:
  - score_0
  - score_1
  - score_2
  - score_3
  - score_4
  - score_5
  sample_size: 200
phase2:
  endpoint: https://api.swissai.cscs.ch/v1
  judge_models:
  - alias: glm-4.5-air
    api_name: jminder/jZ7aJGjetjNN
    hf_slug: zai-org/GLM-4.5-Air-FP8
  # - alias: olmo3-32B-think
  #   api_name: jminder/UqFTpAeJcvV4
  #   hf_slug: olmo-ai/olmo-3-32b-thinking
  - alias: kimi-k2.5
    api_name: jkminder/lAiFTaihSJ
    hf_slug: moonshotai/Kimi-K2.5
  generator_models:
  - alias: glm-4.5-air
    api_name: jminder/jZ7aJGjetjNN
    hf_slug: zai-org/GLM-4.5-Air-FP8
  # - alias: olmo3-32B-think
  #   api_name: jminder/UqFTpAeJcvV4
  #   hf_slug: olmo-ai/olmo-3-32b-thinking
  - alias: kimi-k2.5
    api_name: jkminder/lAiFTaihSJ
    hf_slug: moonshotai/Kimi-K2.5
  improver:
    judge_prompt: improver_judge.md
    generator_prompt: improver_generator.md
    max_batches_per_phase: 5
    timeout_s: 1800
  scoring:
    scale_min: 1
    scale_max: 5
    accept_threshold: 4
    dimensions:
    - relevance
    - specificity
    - charter_grounding
    - voice_tone
  iteration:
    n_items: 50
    n_gold: 10
    max_concurrent: 50
  loop: {}
phase3:
  gold_judges:
  - alias: glm-4.5-air
    api_name: jminder/jZ7aJGjetjNN
    hf_slug: zai-org/GLM-4.5-Air-FP8
  gold_generators:
  - alias: glm-4.5-air
    api_name: jminder/jZ7aJGjetjNN
    hf_slug: zai-org/GLM-4.5-Air-FP8
  target_models:
  - alias: olmo3-7B-think
    api_name: jminder/XXXXXXXX
    hf_slug: olmo-ai/olmo-3-7b-thinking
  improver:
    judge_prompt: improver_phase3_judge.md
    generator_prompt: improver_phase3_generator.md
    max_batches_per_phase: 5
    timeout_s: 1800
  scoring:
    scale_min: 1
    scale_max: 5
    accept_threshold: 4
    dimensions:
    - relevance
    - specificity
    - charter_grounding
    - voice_tone
  iteration:
    n_items: 256
    n_gold: 24
    max_concurrent: 50
  escalation:
    max_per_iteration: 10
dashboard:
  port: 8600
