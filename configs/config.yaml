      scale_min: 1
      scale_max: 5
      accept_threshold: 4
      dimensions:
      - relevance
      - specificity
      - charter_grounding
      - voice_tone
    iteration:
      n_items: 100
      n_gold: 10
      max_concurrent: 100
    loop: {}
