  improver:
    judge_prompt: improver_judge.md
    generator_prompt: improver_generator.md
    max_batches_per_phase: 5
    timeout_s: 3600
  scoring:
    scale_min: 1
    scale_max: 5
    accept_threshold: 4
    dimensions:
    - relevance
    - specificity
    - charter_grounding
    - voice_tone
  iteration:
    n_items: 100
    n_gold: 10
    max_concurrent: 100
  loop: {}
phase3:
  endpoint: ${phase2.endpoint}
  eval_dir: data/pipeline/phase3
  gold_judge:
    alias: kimi-k2.5
    api_name: jkminder/lAiFTaihSJ
    hf_slug: moonshotai/Kimi-K2.5
    prompt: judge_reflection_v24.md
    completion_max_tokens: 65536
    context_window_tokens: 65536
  generator_eval:
    n_items: 5000
    seed: 42
    max_concurrent: 512
    chunk_size: 500
    store_reasoning: false
    failure_attempt_cap: 5
    candidates:
    # - alias: glm-4.5-air
    #   api_name: jminder/pZcWDUxqEQ
    #   hf_slug: zai-org/GLM-4.5-Air-FP8
    #   context_window_tokens: 16384
    #   prompt: generator_reflection_v7.md
    # - alias: gpt-oss-120b
    #   api_name: openai/gpt-oss-120b-SSOR
    #   hf_slug: openai/gpt-oss-120b
    #   context_window_tokens: 16384
    #   prompt: generator_reflection_v7.md
    - alias: qwen3.5-35b-a3b
      api_name: Qwen/Qwen3.5-35B-A3B-FP8-kUja
      hf_slug: Qwen/Qwen3.5-35B-A3B-FP8
      context_window_tokens: 24576
      prompt: generator_reflection_v7.md
    # - alias: nemotron-3-super-120b-a12b
    #   api_name: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8-BnAI
    #   hf_slug: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    #   context_window_tokens: 16384
    #   prompt: generator_reflection_v9.md
  judge_eval:
    n_items: 5000
    seed: 42
    max_concurrent: 50
    chunk_size: 200
    include_reviewed: true
    reviewer_policy: average
    store_reasoning: false
    failure_attempt_cap: 3
    generator:
      alias: glm-4.5-air
      api_name: jminder/jZ7aJGjetjNN
      prompt: generator_v1.md
    candidates: []
  scoring:
    scale_min: 1
    scale_max: 5
    accept_threshold: 4
    dimensions:
    - relevance
    - specificity
    - charter_grounding
    - voice_tone
phase4:
  sidecar_path: /iopsstor/scratch/cscs/jminder/tokenized/annotated/sidecar.parquet
  output_dir: ${oc.env:SCRATCH,""}/model-raising-data/phase4
  reflection_prompt: generator_reflection_v1.md
  preflection_prompt: generator_preflection_v1.md
  generator_alias: glm-4.5-air
  thinking: false
  json_mode: false
  max_rows: 0
  rows_per_task: 100000
  max_concurrent_requests: 2048
  save_batch_size: 200
  progress_interval: 1000
  canary_seed: 42
  reflection_seed: 42
  max_retries_per_doc: 5
  sglang:
    hf_slug: zai-org/GLM-4.5-Air-FP8
    model_path: ""
    tp_size: 4
    dp_size: 1
    port: 30000
    env_toml: /users/jminder/repositories/model-launch/src/swiss_ai_model_launch/assets/envs/sglang.toml
    extra_args: ""
    pre_launch_cmds: ""
  slurm:
    partition: normal
    account: a141
    time: "24:00:00"
    cpus_per_task: 4
    mem_per_cpu_gb: 8
    workers: -1
dashboard:
  port: 8600
